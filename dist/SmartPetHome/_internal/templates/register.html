{% extends "base.html" %}
{% block title %}Register — SmartPetHome{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>🐾 SmartPetHome</h1>
    <h2>Create Account</h2>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" required autofocus placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min. 6 characters" minlength="6" />
      </div>
      <div class="form-group">
        <label for="telegram_chat_id">Telegram Chat ID <span class="optional">(optional)</span></label>
        <input type="text" id="telegram_chat_id" name="telegram_chat_id" placeholder="e.g. 123456789" />
        <small>Used to receive push alerts via Telegram bot.</small>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
