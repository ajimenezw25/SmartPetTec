{% extends "base.html" %}
{% block title %}Register — SmartPetHome{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='img/smartpethome-logo.png') }}"
         alt="SmartPetHome"
         class="brand-logo brand-logo-login"
         style="display:none"
         onload="this.style.display='block'"
         onerror="this.remove(); document.getElementById('register-title').style.display='block'">
    <h1 id="register-title" style="display:none; margin-bottom:.5rem;">🐾 SmartPetHome</h1>
    <h2>Create Account</h2>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" required autofocus placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min. 6 characters" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
