{% extends "base.html" %}
{% block title %}Login — SmartPetHome{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='img/smartpethome-logo.png') }}"
         alt="SmartPetHome"
         class="brand-logo brand-logo-login"
         style="display:none"
         onload="this.style.display='block'"
         onerror="this.remove(); document.getElementById('login-title').style.display='block'">
    <h1 id="login-title" style="display:none; margin-bottom:.5rem;">🐾 SmartPetHome</h1>
    <h2>Sign In</h2>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
    </p>

    <div class="auth-end-app">
      <form method="POST" action="/end-app" id="shutdown-form">
        <button type="button" class="btn btn-end-app"
                onclick="if(confirm('Are you sure you want to close SmartPetHome?')){
                  this.textContent='Closing…';
                  this.disabled=true;
                  document.getElementById('shutdown-form').submit();
                }">
          ⏻ End App
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
