{% extends "base.html" %}
{% block title %}Register Device — SmartPetHome{% endblock %}

{% block content %}
<div class="page-header">
  <h1>📡 Register a Device</h1>
  <a href="{{ url_for('devices.index') }}" class="btn btn-outline">← Back to Devices</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('devices.new') }}">

    <div class="form-group">
      <label for="serial_number">Serial Number <span class="required">*</span></label>
      <input type="text" id="serial_number" name="serial_number" required
             placeholder="e.g. SPH-001-2025" />
    </div>

    <div class="form-group">
      <label for="device_name">Device Name <span class="required">*</span></label>
      <input type="text" id="device_name" name="device_name" required
             placeholder="Kitchen Feeder" />
    </div>

    <div class="form-group">
      <label for="device_type_id">Device Type <span class="required">*</span></label>
      <select id="device_type_id" name="device_type_id" required>
        <option value="">— Select a type —</option>
        {% for dt in device_types %}
          <option value="{{ dt.id }}">{{ dt.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="pet_id" id="pet_id_label">
          Assign to Pet <span class="optional" id="pet_required_marker">(optional)</span>
        </label>
        <select id="pet_id" name="pet_id">
          <option value="">— None —</option>
          {% for pet in pets %}
            <option value="{{ pet.id }}">{{ pet.name }}</option>
          {% endfor %}
        </select>
        <small id="pet_id_hint">Required for Automatic Feeder.</small>
      </div>

      <div class="form-group">
        <label for="location_id">Assign to Location <span class="optional">(optional)</span></label>
        <select id="location_id" name="location_id">
          <option value="">— None —</option>
          {% for loc in locations %}
            <option value="{{ loc.id }}">{{ loc.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Register Device</button>
      <a href="{{ url_for('devices.index') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

<script>
(function () {
  var typeSelect = document.getElementById("device_type_id");
  var petSelect  = document.getElementById("pet_id");
  var marker     = document.getElementById("pet_required_marker");
  var hint       = document.getElementById("pet_id_hint");

  function updatePetField() {
    var opt    = typeSelect.options[typeSelect.selectedIndex];
    var text   = opt ? opt.text.toLowerCase() : "";
    var isFeeder = text.indexOf("feeder") !== -1;

    if (isFeeder) {
      petSelect.setAttribute("required", "required");
      marker.textContent = "(required)";
      marker.className   = "required";
      hint.textContent   = "A pet must be assigned for Automatic Feeder devices.";
    } else {
      petSelect.removeAttribute("required");
      marker.textContent = "(optional)";
      marker.className   = "optional";
      hint.textContent   = "Required for Automatic Feeder.";
    }
  }

  if (typeSelect) {
    typeSelect.addEventListener("change", updatePetField);
    updatePetField();
  }
})();
</script>
{% endblock %}
