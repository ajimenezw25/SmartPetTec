{% extends "base.html" %}
{% block title %}Edit Schedule — SmartPetHome{% endblock %}

{% block content %}
<div class="page-header">
  <h1>✏️ Edit Feeding Schedule</h1>
  <a href="{{ url_for('feeder.settings', device_id=device.id) }}" class="btn btn-outline">← Back to Feeder</a>
</div>

<div class="form-card">
  <p class="text-muted">Device: <strong>{{ device.device_name }}</strong></p>

  <form method="POST"
        action="{{ url_for('feeder.edit_schedule', device_id=device.id, sched_id=schedule.id) }}">
    <div class="form-row">
      <div class="form-group">
        <label for="feeding_time">Feeding Time <span class="required">*</span></label>
        <input type="time" id="feeding_time" name="feeding_time" required
               value="{{ schedule.feeding_time[:5] }}" />
      </div>
      <div class="form-group">
        <label for="target_grams">Target Grams <span class="required">*</span></label>
        <input type="number" id="target_grams" name="target_grams"
               step="0.1" min="1" required
               value="{{ schedule.target_grams }}" />
      </div>
      <div class="form-group form-group--checkbox" style="justify-content:center;padding-top:1.5rem;">
        <label>
          <input type="checkbox" name="enabled" {{ 'checked' if schedule.enabled }} />
          Enabled
        </label>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('feeder.settings', device_id=device.id) }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
