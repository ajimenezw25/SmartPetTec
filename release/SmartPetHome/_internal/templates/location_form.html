{% extends "base.html" %}
{% block title %}{{ 'Edit Location' if location else 'New Location' }} — SmartPetHome{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ '✏️ Edit Location' if location else '📍 Add Location' }}</h1>
  <a href="{{ url_for('locations.index') }}" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
  <form method="POST"
        action="{{ url_for('locations.edit', loc_id=location.id) if location else url_for('locations.new') }}">
    <div class="form-group">
      <label for="name">Location Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" required
             value="{{ location.name if location else '' }}"
             placeholder="Living Room, Kennel, Backyard…" />
    </div>
    <div class="form-group">
      <label for="notes">Notes <span class="optional">(optional)</span></label>
      <textarea id="notes" name="notes" rows="2">{{ location.notes if location and location.notes else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if location else 'Create Location' }}</button>
      <a href="{{ url_for('locations.index') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
